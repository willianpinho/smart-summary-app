x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  api:
    image: ${API_IMAGE:-smartsummary-api:local}
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: smartsummary-api
    ports:
      - "127.0.0.1:8200:8000"
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging
    restart: unless-stopped
    networks:
      - default
      - shared-db
