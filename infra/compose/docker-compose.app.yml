services:
  app:
    image: ${APP_IMAGE:-smartsummary-app:local}
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.smartsummary.dev.willianpinho.com}
    container_name: smartsummary-app
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    ports:
      - "127.0.0.1:3300:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    networks:
      - default
